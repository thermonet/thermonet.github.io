<script>
  function toggleDropdown(menuId) {
    const dropdowns = document.querySelectorAll('.dropdown-menu');
    dropdowns.forEach(dropdown => {
      if (dropdown.id === menuId) {
        dropdown.classList.toggle('hidden'); // Toggle the clicked one
      } else {
        dropdown.classList.add('hidden'); // Close all others
      }
    });
  }

  // Optional: close all dropdowns when clicking outside
  document.addEventListener('click', function(event) {
    const isClickInside = event.target.closest('.dropdown-container');
    if (!isClickInside) {
      document.querySelectorAll('.dropdown-menu').forEach(menu => menu.classList.add('hidden'));
    }
  });
</script>

<!-- HERO SECTION -->
<main class="flex justify-center items-center my-12 px-4">
  <div class="text-center bg-gradient-to-br from-red-600 to-orange-500 text-white p-10 rounded-3xl shadow-lg max-w-4xl w-full">

</main>

<!-- GALLERY -->
<section class="max-w-7xl mx-auto my-12 px-4">

<!-- FOOTER -->
<footer class="bg-gray-200 text-sm text-center p-4 mt-12">

</footer>

<script>
  function normalize(value) {
    return value ? value.trim() : "—";
  }

  function formatStatus(value) {
    const status = (value || "").trim().toUpperCase();

    if (status === "Y") return "Active";
    if (status === "N") return "Inactive";
    return "Unknown";
  }

  function getStatusBadge(value) {
    const status = (value || "").trim().toUpperCase();

    if (status === "Y") {
      return `<span class="inline-block px-3 py-1 text-xs font-semibold rounded-full bg-green-100 text-green-700">Active</span>`;
    }

    if (status === "N") {
      return `<span class="inline-block px-3 py-1 text-xs font-semibold rounded-full bg-red-100 text-red-700">Inactive</span>`;
    }

    return `<span class="inline-block px-3 py-1 text-xs font-semibold rounded-full bg-blue-100 text-blue-700">Unknown</span>`;
  }

  function makeSafeFilename(name) {
    return name.trim().replace(/\s+/g, "_");
  }

function findSiteImage(name, imgElement, fallbackElement) {
  const cleanName = name.trim();
  const underscoreName = cleanName.replace(/\s+/g, "_");

  const possibleImages = [
    `sites/${underscoreName}.png`,
    `sites/${underscoreName}.jpg`,
    `sites/${underscoreName}.jpeg`,
    `sites/${underscoreName}.webp`,

    `sites/${cleanName}.png`,
    `sites/${cleanName}.jpg`,
    `sites/${cleanName}.jpeg`,
    `sites/${cleanName}.webp`
  ];

  let index = 0;

  function tryNextImage() {
    if (index >= possibleImages.length) {
      imgElement.classList.add("hidden");
      fallbackElement.classList.remove("hidden");
      return;
    }

    console.log("Trying image:", possibleImages[index]);
    imgElement.src = possibleImages[index] + `?cb=${Date.now()}`;
    index++;
  }

  imgElement.onerror = tryNextImage;

  imgElement.onload = function () {
    imgElement.classList.remove("hidden");
    fallbackElement.classList.add("hidden");
  };

  tryNextImage();
}

  function renderSiteGallery(data) {
    const gallery = document.getElementById("siteGallery");

    if (!data.length) {
      gallery.innerHTML = `
        <div class="col-span-full text-center text-red-600">
          No sites found. Check that data/sites.csv exists and has the correct column names.
        </div>
      `;
      return;
    }

    gallery.innerHTML = data.map((site, i) => `
      <div class="bg-white rounded-2xl shadow-md overflow-hidden hover:shadow-xl transition">
        
        <div class="h-56 bg-gray-100 flex items-center justify-center">
          <img 
            id="site-img-${i}" 
            class="hidden w-full h-full object-cover" 
            alt="${site.name}"
          >

          <div 
            id="site-fallback-${i}" 
            class="hidden w-full h-full flex items-center justify-center text-gray-500 text-center px-6 bg-gray-100"
          >
            No image currently available
          </div>
        </div>

        <div class="p-5 space-y-2">
          <div class="flex justify-between items-start gap-3">
            <h3 class="text-xl font-bold text-red-600">${site.name}</h3>
            ${getStatusBadge(site.active)}
          </div>

          <div class="text-sm text-gray-600 space-y-1">
            <p><strong>Latitude:</strong> ${site.lat}</p>
            <p><strong>Longitude:</strong> ${site.long}</p>
          </div>
        </div>
      </div>
    `).join("");

    data.forEach((site, i) => {
      const img = document.getElementById(`site-img-${i}`);
      const fallback = document.getElementById(`site-fallback-${i}`);
      findSiteImage(site.name, img, fallback);
    });
  }

  async function loadSiteGallery() {
    try {
      const res = await fetch(`data/sites.csv?cb=${Date.now()}`);

      if (!res.ok) {
        throw new Error("Could not load data/sites.csv");
      }

      const csvText = await res.text();

      const parsed = Papa.parse(csvText, {
        header: true,
        skipEmptyLines: true
      });

      const sites = parsed.data
        .map(row => ({
          name: normalize(row.Name),
          lat: normalize(row.Lat),
          long: normalize(row.Long),
          active: normalize(row.Active)
        }))
        .filter(site => site.name !== "—")
        .sort((a, b) => a.name.localeCompare(b.name));

      renderSiteGallery(sites);

    } catch (error) {
      console.error(error);

      document.getElementById("siteGallery").innerHTML = `
        <div class="col-span-full text-center text-red-600">
          Could not load site gallery. Check that <code>data/sites.csv</code> exists and has columns: Name, Lat, Long, Active.
        </div>
      `;
    }
  }

  document.addEventListener("DOMContentLoaded", loadSiteGallery);
</script>

</body>
